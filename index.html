<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>APK Tools Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0b0e14; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .phone-frame { width: 100%; max-width: 400px; background: #12161e; border-radius: 36px; padding: 20px 16px 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 2px #2a3240 inset; position: relative; min-height: 700px; overflow: hidden; color: #fff; }
        .status-bar { display: flex; justify-content: space-between; color: #8892a8; font-size: 12px; padding: 0 4px 14px; }
        .page { display: none; animation: fadeIn 0.35s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .app-title { font-size: 24px; font-weight: bold; text-align: center; margin: 40px 0; }
        .login-box { display: flex; flex-direction: column; gap: 10px; }
        input { background: #1a202c; border: 1px solid #2d3748; padding: 12px; border-radius: 8px; color: white; width: 100%; }
        button { cursor: pointer; padding: 12px; border: none; border-radius: 8px; background: #3182ce; color: white; font-weight: bold; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-card { background: #1a202c; padding: 20px; border-radius: 16px; text-align: center; cursor: pointer; border: 1px solid #2d3748; }
        .bug-section { margin-top: 20px; }
        .bug-output { margin-top: 15px; padding: 10px; background: #000; font-family: monospace; font-size: 12px; min-height: 50px; border-radius: 8px; color: #48bb78; }
        .danger { background: #e53e3e; }
        .ai-btn { background: #805ad5; margin-top: 10px; }
        .track-btn { background: #d69e2e; margin-top: 10px; }
        .bug-num-btn { background: #e53e3e; margin-top: 10px; }
        .ip-locked { color: #f56565; text-align: center; margin-top: 20px; font-size: 14px; }
        .flex-btns { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="phone-frame" id="app">
        <div class="status-bar"><span id="statusTime">12:00</span><span>📶 🔋</span></div>

        <div class="page active" id="loginPage">
            <div class="app-title">APK Tools</div>
            <div class="login-box">
                <input type="password" id="pwInput" placeholder="Password" maxlength="10" />
                <button id="loginBtn">▶ BUKA APK</button>
            </div>
        </div>

        <div class="page" id="dashboardPage">
            <h2>DASHBOARD</h2>
            <div class="menu-grid">
                <div class="menu-card" data-page="ipLockPage"><span>🔒</span><div>Kunci IP</div></div>
                <div class="menu-card" data-page="crashIpPage"><span>💥</span><div>Crash IP</div></div>
                <div class="menu-card" data-page="kenonPage"><span>🚫</span><div>Kenon WA</div></div>
            </div>
        </div>

        <div class="page" id="kenonPage">
            <button class="back-btn" data-back="dashboardPage">‹ Kembali</button>
            <h3>🚫 Kenon WA Target</h3>
            <input type="tel" id="targetKenon" placeholder="Nomor Target (Contoh: 6281...)" style="margin-top: 20px;" />
            <button class="danger" id="kenonBtn" style="width: 100%; margin-top: 10px;">🚫 JALANKAN KENON</button>
            <div class="bug-output" id="kenonOutput">▸ Standby...</div>
        </div>

        <div class="page" id="crashIpPage">
            <button class="back-btn" data-back="dashboardPage">‹ Kembali</button>
            <h3>💥 Crash IP Target</h3>
            <input type="text" id="targetIpCrash" placeholder="Masukkan Target IP..." style="margin-top: 20px;" />
            <button class="danger" id="crashBtn" style="width: 100%; margin-top: 10px;">💥 JALANKAN CRASH</button>
            <div class="bug-output" id="crashOutput">▸ Standby...</div>
        </div>

        <div class="page" id="ipLockPage">
            <button class="back-btn" data-back="dashboardPage">‹ Kembali</button>
            <h3>🔒 Otorisasi & Bug</h3>
            <input type="text" id="ipInput" placeholder="Contoh: 192.168.1.1" />
            <button id="saveIpBtn" style="width: 100%; margin-top: 10px; background: #48bb78;">SIMPAN IP</button>
            <div id="ipStatus" class="ip-locked"></div>
            
            <div id="featureArea" style="display:none; margin-top: 20px;">
                <hr style="border: 0; border-top: 1px solid #2d3748; margin: 10px 0;">
                <input type="tel" id="targetNum" placeholder="Nomor Target..." />
                <div class="flex-btns">
                    <button class="track-btn" id="trackBtn" style="flex: 1;">🔍 Lacak IP</button>
                    <button class="bug-num-btn" id="bugNumBtn" style="flex: 1;">💥 Bug Nomor</button>
                </div>
                <input type="text" id="waBugMsg" placeholder="Isi pesan bug..." style="margin-top: 10px;" />
                <button class="ai-btn" id="aiGenBtn">✨ Generate Pesan Bug (AI)</button>
                <div class="bug-output" id="waBugOutput">▸ Menunggu input...</div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            if(document.getElementById('pwInput').value === '1212') showPage('dashboardPage');
        });

        // Fitur Kenon WA
        document.getElementById('kenonBtn').addEventListener('click', () => {
            const num = document.getElementById('targetKenon').value;
            const out = document.getElementById('kenonOutput');
            out.innerHTML = num.length > 9 ? `<span style="color:#e53e3e">🚫 Perintah Kenon ke ${num} berhasil diproses!</span>` : "▸ Nomor tidak valid!";
        });

        document.getElementById('crashBtn').addEventListener('click', () => {
            const ip = document.getElementById('targetIpCrash').value;
            const out = document.getElementById('crashOutput');
            out.innerHTML = ip.includes('.') ? `<span style="color:#e53e3e">💥 Serangan paket ke ${ip} dikirim!</span>` : "▸ IP tidak valid!";
        });

        document.getElementById('saveIpBtn').addEventListener('click', () => {
            const ip = document.getElementById('ipInput').value;
            if(ip.includes('.')) {
                document.getElementById('ipStatus').innerHTML = `<span style="color:#48bb78">✅ IP ${ip} Terkunci.</span>`;
                document.getElementById('featureArea').style.display = 'block';
            } else {
                document.getElementById('ipStatus').textContent = "❌ IP Tidak valid!";
            }
        });

        document.getElementById('trackBtn').addEventListener('click', () => {
            const num = document.getElementById('targetNum').value;
            document.getElementById('waBugOutput').textContent = num.length > 9 ? `▸ IP Nomor ${num} terdeteksi!` : "▸ Masukkan nomor!";
        });

        document.getElementById('bugNumBtn').addEventListener('click', () => {
            const num = document.getElementById('targetNum').value;
            document.getElementById('waBugOutput').innerHTML = num.length > 9 ? `<span style="color:#e53e3e">💥 Perintah BUG dikirim ke ${num}!</span>` : "▸ Nomor tidak valid!";
        });

        document.getElementById('aiGenBtn').addEventListener('click', async () => {
            const out = document.getElementById('waBugOutput');
            out.textContent = "✨ AI sedang berpikir...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Buatkan pesan prank error WhatsApp singkat." }] }] })
                });
                const data = await response.json();
                document.getElementById('waBugMsg').value = data.candidates[0].content.parts[0].text;
                out.textContent = "▸ Pesan berhasil dibuat!";
            } catch (e) { out.textContent = "▸ Error: AI gagal."; }
        });

        document.querySelectorAll('[data-page]').forEach(card => card.addEventListener('click', () => showPage(card.dataset.page)));
        document.querySelectorAll('[data-back]').forEach(btn => btn.addEventListener('click', () => showPage(btn.dataset.back)));
    </script>
</body>
</html>
